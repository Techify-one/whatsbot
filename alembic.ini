[alembic]
# Path to migration scripts (relative to the project root, where this file lives).
script_location = db/alembic

# Set programmatically in db/connection.py — left empty so direct ``alembic``
# CLI usage falls back to the SQLite default; production code never relies on
# this value.
sqlalchemy.url = sqlite:///storages/whatsbot.db

# Use UTC for new revision filenames.
timezone = UTC

# Format for new revisions: ``YYYYMMDD_HHMM_<slug>.py``.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
